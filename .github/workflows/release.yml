name: Release

on:
  push:
    tags:
      - "v*.*.*"

  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.2.0"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: true
        default: false
        type: boolean
      push_latest:
        description: "Also publish the Docker image with the latest tag"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  IMAGE_NAME: rijuyuezhu/local-shell-mcp
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  PUSH_LATEST: ${{ github.event_name == 'push' || inputs.push_latest }}
  PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}

jobs:
  validate-release:
    name: Validate release input
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      docker_tags: ${{ steps.docker-tags.outputs.tags }}
    steps:
      - uses: actions/checkout@v6

      - name: Validate tag and read project version
        id: version
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import re
          import tomllib

          tag = os.environ["RELEASE_TAG"]
          if not re.fullmatch(r"v?[0-9]+[.][0-9]+[.][0-9]+([-+][0-9A-Za-z.-]+)?", tag):
              raise SystemExit(f"Release tag must look like v0.2.0 or 0.2.0, got {tag!r}")

          with open("pyproject.toml", "rb") as f:
              version = tomllib.load(f)["project"]["version"]

          release_version = tag[1:] if tag.startswith("v") else tag
          if release_version != version:
              raise SystemExit(
                  f"Release tag {tag!r} resolves to version {release_version!r}, "
                  f"but pyproject.toml declares {version!r}"
              )

          print(f"version={version}")
          PY

      - name: Prepare Docker release tags
        id: docker-tags
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          PUSH_LATEST: ${{ env.PUSH_LATEST }}
        run: |
          tags=("${IMAGE_NAME}:${RELEASE_TAG}")
          if [[ "${RELEASE_TAG}" == v* ]]; then
            tags+=("${IMAGE_NAME}:${RELEASE_TAG#v}")
          fi
          if [[ "${PUSH_LATEST}" == "true" ]]; then
            tags+=("${IMAGE_NAME}:latest")
          fi

          json="$(printf '%s\n' "${tags[@]}" | jq -R . | jq -sc .)"
          echo "tags=${json}" >> "$GITHUB_OUTPUT"

  build-python-package:
    name: Build Python package
    runs-on: ubuntu-latest
    needs: validate-release
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build wheel and source distribution
        run: uv build

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum ./* > SHA256SUMS.txt

      - uses: actions/upload-artifact@v7
        with:
          name: python-dist
          path: dist/*
          if-no-files-found: error

  build-binary:
    name: Build binary (${{ matrix.artifact }})
    needs: validate-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: linux-x86_64
            runner: ubuntu-latest
            binary: local-shell-mcp
            archive: tar.gz
          - artifact: linux-aarch64
            runner: ubuntu-24.04-arm
            binary: local-shell-mcp
            archive: tar.gz
          - artifact: macos-x86_64
            runner: macos-15-intel
            binary: local-shell-mcp
            archive: tar.gz
          - artifact: macos-aarch64
            runner: macos-15
            binary: local-shell-mcp
            archive: tar.gz
          - artifact: windows-x86_64
            runner: windows-latest
            binary: local-shell-mcp.exe
            archive: zip
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build self-contained executable
        shell: bash
        run: |
          uv run --with pyinstaller --with typer pyinstaller \
            --clean \
            --onefile \
            --name local-shell-mcp \
            --collect-all local_shell_mcp \
            --collect-all mcp \
            --collect-all uvicorn \
            --collect-all fastapi \
            --collect-all starlette \
            --exclude-module cryptography \
            scripts/pyinstaller-entry.py

      - name: Smoke test executable
        shell: bash
        run: |
          ./dist/${{ matrix.binary }} --help

      - name: Package executable
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release/local-shell-mcp-${{ matrix.artifact }}
          cp dist/${{ matrix.binary }} release/local-shell-mcp-${{ matrix.artifact }}/
          cp README.md LICENSE release/local-shell-mcp-${{ matrix.artifact }}/
          cat > release/local-shell-mcp-${{ matrix.artifact }}/QUICKSTART.txt <<'EOF'
          Start local-shell-mcp without Docker:

            ./local-shell-mcp --mode mcp

          Useful environment variables:

            LOCAL_SHELL_MCP_HOST=0.0.0.0
            LOCAL_SHELL_MCP_PORT=8765
            LOCAL_SHELL_MCP_WORKSPACE_ROOT=/path/to/workspace
            LOCAL_SHELL_MCP_AUTH_MODE=oauth
            LOCAL_SHELL_MCP_PUBLIC_BASE_URL=https://your-public-host.example.com
            LOCAL_SHELL_MCP_OAUTH_ADMIN_PIN=change-me
            LOCAL_SHELL_MCP_OAUTH_JWT_SECRET=change-me-64-hex-random-secret
          EOF
          cd release
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            7z a local-shell-mcp-${{ matrix.artifact }}.zip local-shell-mcp-${{ matrix.artifact }} >/dev/null
          else
            tar -czf local-shell-mcp-${{ matrix.artifact }}.tar.gz local-shell-mcp-${{ matrix.artifact }}
          fi

      - name: Generate binary checksums
        shell: bash
        run: |
          cd release
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum local-shell-mcp-${{ matrix.artifact }}.* > local-shell-mcp-${{ matrix.artifact }}.sha256
          else
            shasum -a 256 local-shell-mcp-${{ matrix.artifact }}.* > local-shell-mcp-${{ matrix.artifact }}.sha256
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.artifact }}
          path: |
            release/local-shell-mcp-${{ matrix.artifact }}.*
          if-no-files-found: error


  build-vscode-extension:
    name: Build VS Code extension
    runs-on: ubuntu-latest
    needs: validate-release
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Sync extension version from release tag
        working-directory: vscode-extension
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          npm version "${VERSION}" --no-git-tag-version --allow-same-version

      - name: Install extension dependencies
        working-directory: vscode-extension
        run: npm ci

      - name: Compile extension
        working-directory: vscode-extension
        run: npm run compile

      - name: Package VSIX
        working-directory: vscode-extension
        run: npm run package:vsix

      - name: Generate VSIX checksum
        shell: bash
        run: |
          cd dist
          sha256sum local-shell-mcp-vscode-*.vsix > local-shell-mcp-vscode.sha256

      - uses: actions/upload-artifact@v7
        with:
          name: vscode-extension
          path: |
            dist/local-shell-mcp-vscode-*.vsix
            dist/local-shell-mcp-vscode.sha256
          if-no-files-found: error


  publish-docker-image:
    name: Publish Docker image (linux/amd64)
    runs-on: ubuntu-latest
    needs: validate-release
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ join(fromJSON(needs.validate-release.outputs.docker_tags), ',') }}
          build-args: |
            BASE_IMAGE=archlinux:latest
            KEYRING_PACKAGE=archlinux-keyring
          cache-from: type=gha,scope=docker-amd64
          cache-to: type=gha,mode=max,scope=docker-amd64

  github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - validate-release
      - build-python-package
      - build-binary
      - build-vscode-extension
      - publish-docker-image
    steps:
      - uses: actions/checkout@v6

      - name: Download Python package artifacts
        uses: actions/download-artifact@v8
        with:
          name: python-dist
          path: dist

      - name: Download binary artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: binary-*
          path: dist
          merge-multiple: true

      - name: Download VS Code extension artifact
        uses: actions/download-artifact@v8
        with:
          name: vscode-extension
          path: dist

      - name: Create combined checksums
        run: |
          cd dist
          find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Create release notes
        run: |
          cat > RELEASE_NOTES.md <<EOF
          Docker image:

          \`\`\`bash
          docker pull ${{ env.IMAGE_NAME }}:${{ env.RELEASE_TAG }}
          \`\`\`

          Docker platform:

          \`\`\`text
          linux/amd64
          \`\`\`

          All-in-one executable downloads are attached for:

          \`\`\`text
          linux-x86_64
          linux-aarch64
          macos-x86_64
          macos-aarch64
          windows-x86_64
          \`\`\`

          Start without Docker:

          \`\`\`bash
          ./local-shell-mcp --mode mcp
          \`\`\`

          VS Code extension download:

          \`\`\`text
          local-shell-mcp-vscode-${{ needs.validate-release.outputs.version }}.vsix
          \`\`\`

          Python package artifacts, executable archives, VS Code extension, and SHA256 checksums are attached below.

          Python package version in \`pyproject.toml\`: \`${{ needs.validate-release.outputs.version }}\`
          EOF

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ env.PRERELEASE }}
          generate_release_notes: true
          body_path: RELEASE_NOTES.md
          files: dist/*
