name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.2.0"
        required: true
        type: string
      platforms:
        description: "Docker platforms to build"
        required: true
        default: "linux/amd64,linux/arm64"
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: true
        default: false
        type: boolean
      push_latest:
        description: "Also publish the Docker image with the latest tag"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

env:
  IMAGE_NAME: fwerkor/local-shell-mcp

jobs:
  validate-release:
    name: Validate release input
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Check tag matches project version
        id: version
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import re
          import tomllib

          tag = os.environ["RELEASE_TAG"]
          if not re.fullmatch(r"v?[0-9]+[.][0-9]+[.][0-9]+([-+][0-9A-Za-z.-]+)?", tag):
              raise SystemExit(f"Release tag must look like v0.2.0 or 0.2.0, got {tag!r}")

          with open("pyproject.toml", "rb") as f:
              version = tomllib.load(f)["project"]["version"]

          tag_version = tag[1:] if tag.startswith("v") else tag
          if tag_version != version:
              raise SystemExit(
                  f"Release tag {tag!r} does not match pyproject.toml version {version!r}"
              )

          print(f"version={version}")
          PY

  build-python-package:
    name: Build Python package
    runs-on: ubuntu-latest
    needs: validate-release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel and source distribution
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Generate checksums
        run: |
          cd dist
          sha256sum ./* > SHA256SUMS.txt

      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*
          if-no-files-found: error

  publish-docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: validate-release
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare Docker tags
        id: docker-tags
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag }}
          PUSH_LATEST: ${{ github.event.inputs.push_latest }}
        run: |
          {
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:${RELEASE_TAG}"
            if [[ "${RELEASE_TAG}" == v* ]]; then
              echo "${IMAGE_NAME}:${RELEASE_TAG#v}"
            fi
            if [[ "${PUSH_LATEST}" == "true" ]]; then
              echo "${IMAGE_NAME}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ github.event.inputs.platforms }}
          push: true
          tags: ${{ steps.docker-tags.outputs.tags }}

  github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - validate-release
      - build-python-package
      - publish-docker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Create release notes
        run: |
          cat > RELEASE_NOTES.md <<EOF
          Docker image:

          \`\`\`bash
          docker pull ${{ env.IMAGE_NAME }}:${{ github.event.inputs.tag }}
          \`\`\`

          Multi-platform image platforms:

          \`\`\`text
          ${{ github.event.inputs.platforms }}
          \`\`\`

          Python package artifacts and SHA256 checksums are attached below.
          EOF

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ github.event.inputs.prerelease }}
          generate_release_notes: true
          body_path: RELEASE_NOTES.md
          files: dist/*
