name: Bug report
description: Report a reproducible local-shell-mcp problem
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Redact credentials, local paths, and workspace data before posting.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide a minimal sequence of commands or UI steps.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs and diagnostics
      description: Redact sensitive values before posting.
      render: text
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v3.6.0 or git SHA
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: OS, architecture, Python version, Docker version, MCP client, browser, tunnel provider
