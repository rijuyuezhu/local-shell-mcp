name: Feature request
description: Propose a focused improvement
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What limitation are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should local-shell-mcp do differently?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: safety
    attributes:
      label: Safety and compatibility notes
      description: Mention new permissions, host access, network behavior, credentials, or MCP surface changes.
