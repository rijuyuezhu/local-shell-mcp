site_name: local-shell-mcp
site_description: ChatGPT-compatible MCP server for controlled local shell, filesystem, git, browser, and remote-worker access.
site_url: https://fwerkor.github.io/local-shell-mcp/
repo_url: https://github.com/fwerkor/local-shell-mcp
repo_name: fwerkor/local-shell-mcp
nav:
  - Home: index.md
  - Getting started:
      - Quickstart: getting-started/quickstart.md
      - ChatGPT connector: getting-started/chatgpt-connector.md
  - Guides:
      - Deployment: guides/deployment.md
      - Remote workers: guides/remote-workers.md
      - File links: guides/file-links.md
      - Audit log: guides/audit-log.md
      - Git access: guides/git-access.md
      - VS Code extension: guides/vscode.md
  - Reference:
      - Tools: reference/tools.md
      - Configuration: reference/configuration.md
      - REST API: reference/rest-api.md
  - Security: security.md
  - Troubleshooting: troubleshooting.md
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true
plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
