site_name: local-shell-mcp
site_description: ChatGPT-compatible OAuth MCP server for controlled local shell, filesystem, and git access
site_url: https://project.rijuyuezhu.top/local-shell-mcp/
repo_url: https://github.com/rijuyuezhu/local-shell-mcp
repo_name: rijuyuezhu/local-shell-mcp
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.suggest
    - content.action.edit
    - content.code.copy
    - content.tabs.link
  palette:
    - scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Getting started:
      - Quickstart: getting-started/quickstart.md
      - ChatGPT connector: getting-started/chatgpt-connector.md
      - Docker Compose: getting-started/docker-compose.md
      - Cloudflare Tunnel: getting-started/cloudflare-tunnel.md
      - Install options: getting-started/install-options.md
      - VS Code: getting-started/vscode.md
  - Guides:
      - Common workflows: guides/common-workflows.md
      - Example prompts: guides/example-prompts.md
      - Remote workers: guides/remote-workers.md
      - Agent capability bridge: guides/agent-bridge.md
      - Git access: guides/git-access.md
      - Audit log: guides/audit-log.md
  - Reference:
      - Configuration: reference/configuration.md
      - CLI: reference/cli.md
      - Tools: reference/tools.md
  - Security: security.md
  - Community:
      - Code of conduct: community/code-of-conduct.md
      - Contributing: community/contributing.md
      - Support: community/support.md
      - Security policy: community/security-policy.md
  - Maintenance:
      - Upstream sync ledger: maintenance/upstream-sync/README.md
      - Selective sync through 3382d10:
          - Overview: maintenance/upstream-sync/b30781c/README.md
          - Tool surface: maintenance/upstream-sync/b30781c/01-tool-surface.md
          - REST validation: maintenance/upstream-sync/b30781c/02-rest-validation.md
          - Routed audit: maintenance/upstream-sync/b30781c/03-routed-audit.md
          - Shell environment filtering: maintenance/upstream-sync/b30781c/04-shell-env-filtering.md
          - Tool descriptions: maintenance/upstream-sync/b30781c/05-tool-descriptions.md
          - HTTP/MCP parity: maintenance/upstream-sync/b30781c/06-http-mcp-parity.md
          - Remote capabilities: maintenance/upstream-sync/b30781c/07-remote-capabilities.md
          - Export tools: maintenance/upstream-sync/b30781c/08-export-tools.md
          - Docs site i18n: maintenance/upstream-sync/b30781c/09-docs-site-i18n.md
          - Agent bridge: maintenance/upstream-sync/b30781c/10-agent-bridge.md
          - Windows shell: maintenance/upstream-sync/b30781c/11-windows-shell.md
          - Release metadata: maintenance/upstream-sync/b30781c/12-release-metadata.md
          - Community files: maintenance/upstream-sync/b30781c/14-community-files.md
