# Full YAML config example.
# Effective precedence: defaults < config file < LOCAL_SHELL_MCP_* environment variables < CLI arguments.

# Server.
# Server transport mode.
# Choices: mcp, http, both, stdio.
mode: "mcp"
# Bind host for HTTP/MCP transports.
host: "0.0.0.0"
# Bind port for HTTP/MCP transports.
port: 8765

# Paths and state.
# Root directory for normal file and command operations.
workspace_root: "/workspace"
# Directory for runtime state such as audit logs and temporary files.
state_dir: "/workspace/.local-shell-mcp"
# Path to the JSONL audit log.
audit_log_path: "/workspace/.local-shell-mcp/audit.jsonl"

# Authentication and OAuth.
# Authentication mode. Do not expose public services with none.
# Choices: none, oauth.
auth_mode: "oauth"
# Allow localhost requests without bearer authentication.
auth_bypass_localhost: true
# Require bearer auth for MCP-over-HTTP requests; OAuth/bootstrap routes remain public.
require_auth_for_mcp_discovery: true
# Public HTTPS origin used in OAuth metadata and callbacks.
public_base_url: null
# Advanced compatibility override for OAuth issuer metadata; usually derived from public_base_url.
oauth_issuer: null
# Advanced compatibility override for OAuth resource metadata; usually derived from public_base_url
# plus /mcp.
oauth_resource: null
# PIN required to approve OAuth authorization.
oauth_admin_pin: null
# Advanced bearer token lifetime in seconds.
oauth_access_token_ttl_s: 3600
# Advanced OAuth authorization-code lifetime in seconds.
oauth_code_ttl_s: 300

# Safety and resource limits.
# Disable built-in workspace and command restrictions; use only in disposable containers or VMs.
allow_full_container: false
# Allow network-capable operations.
allow_network: true
# Advertise lower-risk MCP client hints for local tools without changing server-side authentication or
# command policy.
relaxed_client_tool_hints: false
# Public MCP/HTTP tool watchdog timeout in seconds.
public_tool_timeout_s: 60
# Default timeout for public run_shell_command calls in seconds.
public_run_shell_default_timeout_s: 10
# Maximum timeout accepted by public run_shell_command calls in seconds.
public_run_shell_max_timeout_s: 60
# Advanced internal shell command default timeout in seconds; public run_shell_command uses stricter
# public settings.
internal_shell_default_timeout_s: 60
# Advanced internal shell command maximum timeout in seconds; public run_shell_command uses stricter
# public settings.
internal_shell_max_timeout_s: 3600
# Command output truncation limit in bytes.
max_output_bytes: 200000
# Per-file read limit in bytes.
max_file_read_bytes: 512000
# Per-file write/edit limit in bytes.
max_file_write_bytes: 5000000
# Maximum grep result count.
max_grep_results: 200
# Maximum listed directory entries.
max_directory_entries: 5000
# Maximum glob search results.
max_glob_results: 5000
# Maximum tree-view entries.
max_tree_entries: 5000
# Maximum files read by a multi-file read operation.
max_read_many_files: 100
# Combined byte limit for multi-file reads.
max_read_many_total_bytes: 5000000
# Todo-list item limit.
max_todos: 1000
# Todo-list serialized byte limit.
max_todo_bytes: 1000000
# Audit-log rotation threshold in bytes.
max_audit_log_bytes: 20000000
# Temporary-file count limit.
max_tmp_files: 500
# Temporary-file byte limit.
max_tmp_bytes: 50000000
# Concurrent command limit.
max_concurrent_commands: 4
# Persistent shell session limit.
max_tmux_sessions: 16
# Enable tokenized public download links created by protected tools.
file_download_enabled: true
# Default lifetime for generated file download links in seconds.
file_download_default_ttl_s: 3600
# Maximum lifetime accepted for generated file download links in seconds.
file_download_max_ttl_s: 604800
# Default download-count limit for file links; 0 means unlimited until expiry.
file_download_default_max_downloads: 0
# Maximum file size allowed for download links; 0 disables this size limit.
file_download_max_file_bytes: 0
# Comma-separated command denylist in env/CLI, or a YAML list in config files. Cleared when
# full-container mode is enabled.
command_denylist:
  - "docker.sock"
  - "/var/run/docker.sock"
  - "mkfs"
  - "mount"
  - "umount"
  - "shutdown"
  - "reboot"
  - "systemctl"
  - "iptables"
  - "nft"
# Comma-separated path denylist in env/CLI, or a YAML list in config files. Cleared when
# full-container mode is enabled.
path_denylist:
  - ".ssh/id_rsa"
  - ".ssh/id_ed25519"
  - ".env"
  - "secrets"
  - "credentials"
  - ".git/config"

# Remote workers.
# Enable remote worker routes and MCP tools.
remote_enabled: true
# One-time remote worker invite lifetime in seconds.
remote_invite_ttl_s: 600
# Remote worker long-poll heartbeat timeout in seconds.
remote_poll_timeout_s: 25
# Control-side remote job result timeout in seconds.
remote_job_timeout_s: 3600

# Agent capability bridge.
# Enable agent capability bridge tools.
agent_bridge_enabled: true
# Read-only capability config directory.
agent_config_dir: "/workspace/.local-shell-mcp/agent_config"
# Agent MCP server probe timeout in seconds.
agent_mcp_probe_timeout_s: 5
# Agent MCP tool-call timeout in seconds.
agent_mcp_call_timeout_s: 60
# Register dynamic MCP bridge tools.
agent_dynamic_mcp_tools: true
# Register dynamic skill bridge tools.
agent_dynamic_skill_tools: true

# Tool executables.
# Shell executable used for shell commands.
shell_executable: "/bin/bash"
# tmux executable.
tmux_bin: "tmux"
# ripgrep executable.
rg_bin: "rg"
# Python executable.
python_bin: "python3"
