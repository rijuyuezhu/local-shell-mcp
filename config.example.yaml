host: 0.0.0.0
port: 8765
mode: mcp
workspace_root: /workspace
audit_log_path: /workspace/.local-shell-mcp/audit.jsonl
state_dir: /workspace/.local-shell-mcp
allow_full_container: false
auth_mode: cloudflare_access
cf_access_team_domain: your-team.cloudflareaccess.com
cf_access_audience: your-access-aud-tag
cf_access_allowed_emails:
  - you@example.com
cf_access_allowed_email_domains: []
max_timeout_s: 3600
max_output_bytes: 200000
max_file_read_bytes: 512000
max_file_write_bytes: 5000000
command_denylist:
  - docker.sock
  - /var/run/docker.sock
  - mkfs
  - 'mount '
  - 'umount '
  - shutdown
  - reboot
  - 'systemctl '
path_denylist:
  - .ssh/id_rsa
  - .ssh/id_ed25519
  - .env
  - secrets
  - credentials
  - .git/config


# Remote worker mode is enabled by default. Remote workers connect back to this
# server with one-time invites and expose near-parity remote_* tools.
remote:
  enabled: true
  invite_ttl_s: 600
  poll_timeout_s: 25
  job_timeout_s: 3600
