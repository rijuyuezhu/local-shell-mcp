services:
  local-shell-mcp:
    build: .
    image: local-shell-mcp:latest
    container_name: local-shell-mcp
    restart: unless-stopped
    ports:
      - "127.0.0.1:8765:8765"
    environment:
      LOCAL_SHELL_MCP_MODE: "mcp"
      LOCAL_SHELL_MCP_HOST: "0.0.0.0"
      LOCAL_SHELL_MCP_PORT: "8765"
      LOCAL_SHELL_MCP_WORKSPACE_ROOT: "/workspace"
      LOCAL_SHELL_MCP_AUTH_MODE: "cloudflare_access"
      # Set these in .env or compose override.
      LOCAL_SHELL_MCP_CF_ACCESS_TEAM_DOMAIN: "${LOCAL_SHELL_MCP_CF_ACCESS_TEAM_DOMAIN:-}"
      LOCAL_SHELL_MCP_CF_ACCESS_AUDIENCE: "${LOCAL_SHELL_MCP_CF_ACCESS_AUDIENCE:-}"
      LOCAL_SHELL_MCP_CF_ACCESS_ALLOWED_EMAILS: "${LOCAL_SHELL_MCP_CF_ACCESS_ALLOWED_EMAILS:-}"
      LOCAL_SHELL_MCP_CF_ACCESS_ALLOWED_EMAIL_DOMAINS: "${LOCAL_SHELL_MCP_CF_ACCESS_ALLOWED_EMAIL_DOMAINS:-}"
      # Set to true only inside disposable containers where ChatGPT may access absolute paths.
      LOCAL_SHELL_MCP_ALLOW_FULL_CONTAINER: "${LOCAL_SHELL_MCP_ALLOW_FULL_CONTAINER:-false}"
    volumes:
      - ./workspaces/default:/workspace
      # Optional: mount an ssh-agent socket instead of private keys.
      # - ${SSH_AUTH_SOCK}:${SSH_AUTH_SOCK}
    # environment:
    #   SSH_AUTH_SOCK: ${SSH_AUTH_SOCK}

  # Optional Cloudflare Tunnel sidecar. You can also run cloudflared on the host.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: local-shell-mcp-cloudflared
    restart: unless-stopped
    profiles: ["tunnel"]
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - local-shell-mcp
