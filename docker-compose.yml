services:
  local-shell-mcp:
    image: rijuyuezhu/local-shell-mcp:latest
    container_name: local-shell-mcp
    restart: unless-stopped
    ports:
      - "127.0.0.1:8765:8765"
    env_file:
      - .env
    volumes:
      - ./workspaces/default:/home
      - ./workspaces/default/agent/workspace:/workspace
      - local-shell-mcp-credentials:/persist/credentials
      # Optional: mount an ssh-agent socket instead of private keys.
      # - ${SSH_AUTH_SOCK}:${SSH_AUTH_SOCK}
    # environment:
    #   SSH_AUTH_SOCK: ${SSH_AUTH_SOCK}

  # Optional Cloudflare Tunnel sidecar. This does not use Cloudflare Access.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: local-shell-mcp-cloudflared
    restart: unless-stopped
    profiles: ["tunnel"]
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - local-shell-mcp

volumes:
  local-shell-mcp-credentials:
