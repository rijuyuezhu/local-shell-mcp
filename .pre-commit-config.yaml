repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: generate-config-examples
        name: generate config examples
        entry: uv run python scripts/generate-config-examples.py
        language: system
        pass_filenames: false
        files: ^(src/local_shell_mcp/config/(settings|surface)\.py|scripts/generate-config-examples\.py|\.env\.example|config\.example\.yaml|docs/reference/generated/configuration\.json)$
      - id: generate-tools-reference
        name: generate tools reference
        entry: uv run python scripts/export-tools-json.py --wrapped --output docs/reference/generated/tools.json --instructions-output docs/reference/generated/server-instructions.json
        language: system
        pass_filenames: false
        files: ^(src/local_shell_mcp/(agent_bridge|config|ops|remote|schemas|server|tools|utils)/.*\.py|scripts/export-tools-json\.py|docs/reference/generated/(tools|server-instructions)\.json)$
      - id: vscode-extension-format
        name: vscode-extension format
        entry: bash -c 'cd vscode-extension && npm ci && npm run format:check'
        language: system
        pass_filenames: false
        files: ^vscode-extension/(src/.*\.ts|.*\.(json|md|mjs)|package-lock\.json)$
      - id: vscode-extension-lint
        name: vscode-extension lint
        entry: bash -c 'cd vscode-extension && npm ci && npm run lint'
        language: system
        pass_filenames: false
        files: ^vscode-extension/(src/.*\.ts|eslint\.config\.mjs|package(-lock)?\.json|tsconfig\.json)$
      - id: vscode-extension-compile
        name: vscode-extension compile
        entry: bash -c 'cd vscode-extension && npm ci && npm run compile'
        language: system
        pass_filenames: false
        files: ^vscode-extension/(src/.*\.ts|package(-lock)?\.json|tsconfig\.json)$
